name: Build and Publish Release

on:
  release:
    types: ["created"]

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            slug: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            slug: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: >
          docker buildx imagetools create
          -t ${{ env.REGISTRY_IMAGE }}:latest
          -t ${{ env.REGISTRY_IMAGE }}:${{ github.sha }}
          -t ${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }}
          $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v7
        with:
          node-version: "25"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate static files
        run: pnpm generate

      - name: Zip client bundle
        run: zip -r client-bundle.zip .output/public

      - name: Upload client bundle to release
        uses: softprops/action-gh-release@v3
        with:
          files: client-bundle.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Updating config.json for not-th.re public
        run: >
          echo "{\"baseURL\": \"https://api.not-th.re/\", \"termsURL\":
          \"https://scolasti.co/go/privacy\", \"drawURL\": \"https://draw.not-th.re/\"}" > .output/public/config.json

      - name: Upload client bundle to cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .output/public/ --project-name=not-three --commit-dirty=true --branch=main
          packageManager: pnpm
